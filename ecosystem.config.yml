apps:
  # -------------------------
  # Backend
  # -------------------------
  - name: merosadak-backend
    cwd: ./backend
    script: dist/index.js
    watch: false
    instances: 1
    autorestart: true
    max_restarts: 10
    restart_delay: 3000
    env:
      NODE_ENV: production
      PORT: 4000
    env_development:
      NODE_ENV: development
      PORT: 4000

  # -------------------------
  # Frontend (Optional: serve built frontend)
  # -------------------------
  - name: merosadak-frontend
    cwd: ./frontend
    script: serve
    args: -s dist -l 5000
    watch: false
    instances: 1
    autorestart: true
    max_restarts: 10
    restart_delay: 3000
    env:
      NODE_ENV: production
      PORT: 5000
    env_development:
      NODE_ENV: development
      PORT: 5000
