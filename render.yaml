services:
  - type: web
    name: merosadak-backend
    env: node
    nodeVersion: "20"
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_MAX
        value: "100"
