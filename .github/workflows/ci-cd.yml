name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────
  # Backend Tests & Build
  # ────────────────────────────────
  backend-test:
    name: Backend - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint || echo "skip lint"

      - name: Type check
        run: npx tsc --noEmit || echo "type check warning"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          JWT_SECRET: test-secret-for-ci

  # ────────────────────────────────
  # Frontend Tests & Build
  # ────────────────────────────────
  frontend-test:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint || echo "skip lint"

      - name: Build
        run: npm run build

  # ────────────────────────────────
  # Deploy Backend (Render)
  # ────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy Backend
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          else
            echo "Render deploy hook missing"
          fi

  # ────────────────────────────────
  # Deploy Worker (WRANGLER - REQUIRED)
  # ────────────────────────────────
  deploy-worker:
    name: Deploy Worker (Wrangler)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}

  # ────────────────────────────────
  # Deploy Frontend (Firebase Hosting)
  # ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Firebase)
    runs-on: ubuntu-latest
    needs: [frontend-test, deploy-worker]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        if: secrets.FIREBASE_SERVICE_ACCOUNT != ''

  # ────────────────────────────────
  # Telegram Notifications
  # ────────────────────────────────
  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-worker, deploy-frontend]
    if: always()

    steps:
      - name: Send Telegram Message
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="🚀 CI/CD Update: $STATUS%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AWorker: Wrangler deployed%0ABackend + Frontend updated"