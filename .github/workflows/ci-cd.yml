name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - worker
          - frontend
      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '24'

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------
  # BACKEND
  # ---------------------------------------------------------
  backend:
    name: 🔧 Backend
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Deploy Render
        if: github.event.inputs.environment != 'dev'
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ---------------------------------------------------------
  # WORKER
  # ---------------------------------------------------------
  worker:
    name: ☁️ Worker
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'worker'

    steps:
      - uses: actions/checkout@v4

      - run: npm install -g wrangler

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ---------------------------------------------------------
  # FRONTEND
  # ---------------------------------------------------------
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend'

    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy Firebase
        if: github.event.inputs.environment != 'dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: sadak-sathi-3ab73
          channelId: live
          entryPoint: "./frontend"

  # ---------------------------------------------------------
  # TELEGRAM ALERT (FAILURE ONLY 🚨)
  # ---------------------------------------------------------
  notify-failure:
    name: 🚨 Failure Alert
    runs-on: ubuntu-latest
    needs: [backend, worker, frontend]
    if: failure()

    steps:
      - name: Send Telegram Alert
        run: |
          MSG="🚨 DEPLOY FAILED%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ATarget: ${{ github.event.inputs.deploy_target || 'auto' }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MSG"

  # ---------------------------------------------------------
  # SUCCESS LOG (CLEAN)
  # ---------------------------------------------------------
  success:
    name: ✅ Success
    runs-on: ubuntu-latest
    needs: [backend, worker, frontend]
    if: success()

    steps:
      - run: echo "Deploy completed successfully"