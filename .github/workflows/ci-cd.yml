name: MeroSadak PRO Deploy

# ---------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------
on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - worker
          - frontend

      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

      force_deploy:
        description: "Skip health checks and force deploy"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "20"
  CACHE_KEY: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------
# PRE-FLIGHT CHECKS
# ---------------------------------------------------------
jobs:
  preflight:
    name: 🔍 Environment & Secrets Check
    runs-on: ubuntu-latest

    outputs:
      secrets_status: ${{ steps.check_secrets.outputs.status }}
      render_configured: ${{ steps.check_secrets.outputs.render_ok }}
      firebase_configured: ${{ steps.check_secrets.outputs.firebase_ok }}
      worker_configured: ${{ steps.check_secrets.outputs.worker_ok }}
      telegram_configured: ${{ steps.check_secrets.outputs.telegram_ok }}
      jwt_configured: ${{ steps.check_secrets.outputs.jwt_ok }}
      missing_count: ${{ steps.check_secrets.outputs.missing_count }}
      total_count: ${{ steps.check_secrets.outputs.total_count }}
      environment: ${{ steps.detect_env.outputs.env }}
      is_pr: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Check required secrets
        id: check_secrets
        run: |
          echo "============================================="
          echo "  🔐 SECRETS STATUS CHECK"
          echo "============================================="
          echo ""

          REQUIRED_MISSING=0
          OPTIONAL_MISSING=0
          CONFIGURED=0
          TOTAL=0

          echo "--- 🎨 RENDER ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "✅ RENDER_DEPLOY_HOOK: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "render_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ RENDER_DEPLOY_HOOK: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "render_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 🔥 FIREBASE ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "✅ FIREBASE_SERVICE_ACCOUNT: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "firebase_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ FIREBASE_SERVICE_ACCOUNT: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "firebase_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 🔑 JWT AUTH ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "✅ JWT_SECRET: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "jwt_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ JWT_SECRET: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "jwt_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- ☁️ CLOUDFLARE WORKER ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "✅ CLOUDFLARE_API_TOKEN: Configured (Worker keep-alive)"
            CONFIGURED=$((CONFIGURED + 1))
            echo "worker_ok=true" >> $GITHUB_OUTPUT
          else
            echo "🔄 CLOUDFLARE_API_TOKEN: Missing (UptimeRobot fallback)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            echo "worker_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 📱 TELEGRAM NOTIFICATIONS ---"
          TOTAL=$((TOTAL + 1))
          TELEGRAM_OK=true
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN: Configured"
            CONFIGURED=$((CONFIGURED + 1))
          else
            echo "⚠️ TELEGRAM_BOT_TOKEN: Missing (notifications disabled)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            TELEGRAM_OK=false
          fi

          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID: Configured"
            CONFIGURED=$((CONFIGURED + 1))
          else
            echo "⚠️ TELEGRAM_CHAT_ID: Missing (notifications disabled)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            TELEGRAM_OK=false
          fi

          if [ "$TELEGRAM_OK" = true ]; then
            echo "telegram_ok=true" >> $GITHUB_OUTPUT
          else
            echo "telegram_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "============================================="
          echo "  📊 SUMMARY"
          echo "============================================="
          echo "Total secrets checked: $TOTAL"
          echo "✅ Configured: $CONFIGURED"
          echo "❌ Required missing: $REQUIRED_MISSING"
          echo "⚠️ Optional missing: $OPTIONAL_MISSING"
          echo ""

          echo "missing_count=$REQUIRED_MISSING" >> $GITHUB_OUTPUT
          echo "optional_missing_count=$OPTIONAL_MISSING" >> $GITHUB_OUTPUT
          echo "configured_count=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$REQUIRED_MISSING" -eq 0 ]; then
            echo "✅ All required secrets configured - ready to deploy!"
            echo "status=ready" >> $GITHUB_OUTPUT
          else
            echo "❌ $REQUIRED_MISSING required secret(s) missing!"
            echo "status=missing_required" >> $GITHUB_OUTPUT
          fi

      - name: Detect environment
        id: detect_env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "env=preview" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

# ---------------------------------------------------------
# COMMIT LINT
# ---------------------------------------------------------
  commit-lint:
    name: 📝 Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint commit messages
        run: |
          echo "📝 Checking commit messages..."
          COMMITS=$(git log --oneline ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          echo "$COMMITS"

          INVALID=0
          while IFS= read -r line; do
            MSG=$(echo "$line" | cut -d' ' -f2-)
            if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+"; then
              echo "⚠️ Invalid: $MSG"
              INVALID=$((INVALID + 1))
            else
              echo "✅ Valid: $MSG"
            fi
          done <<< "$COMMITS"

          if [ "$INVALID" -gt 0 ]; then
            echo ""
            echo "❌ $INVALID commit(s) don't follow Conventional Commits"
            echo "Format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi
          echo ""
          echo "✅ All commit messages valid!"

# ---------------------------------------------------------
# PATH DETECTION
# ---------------------------------------------------------
  detect-changes:
    name: 📂 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      worker: ${{ steps.filter.outputs.worker }}
      all: ${{ steps.filter.outputs.all }}

    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'package.json'
              - 'render.yaml'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-cd.yml'
            worker:
              - 'backend/cloudflare/**'
              - 'wrangler.toml'
              - '.github/workflows/ci-cd.yml'
            all:
              - '**'

# ---------------------------------------------------------
# BACKEND (PARALLEL)
# ---------------------------------------------------------
  backend:
    name: 🔧 Backend
    runs-on: ubuntu-latest
    needs: [preflight, detect-changes]

    if: >
      (github.event_name == 'push' ||
       github.event.inputs.deploy_target == 'all' ||
       github.event.inputs.deploy_target == 'backend' ||
       github.event.inputs.force_deploy == true) &&
      (needs.detect-changes.outputs.backend == 'true' ||
       needs.preflight.outputs.is_pr == 'true' ||
       github.event.inputs.force_deploy == true)

    outputs:
      build_time: ${{ steps.build_time.outputs.duration }}
      deploy_status: ${{ steps.render_deploy.outputs.status }}
      health_status: ${{ steps.health_check.outputs.status }}
      preview_url: ${{ steps.render_deploy.outputs.preview_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Restore backend cache
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            backend/dist
          key: backend-${{ env.CACHE_KEY }}
          restore-keys: |
            backend-${{ runner.os }}-node-

      - name: Install backend dependencies
        run: cd backend && npm install --include=dev
        timeout-minutes: 5

      - name: Save backend cache
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            backend/dist
          key: backend-${{ env.CACHE_KEY }}

      - name: Build backend
        id: build_step
        run: cd backend && npm run build
        env:
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Calculate build time
        id: build_time
        run: |
          DURATION=$(($SECONDS))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "⏱️ Build completed in ${DURATION}s"

      - name: Deploy Render (Production)
        id: render_deploy
        if: >
          github.event_name != 'pull_request' &&
          needs.preflight.outputs.environment != 'dev'
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Render deployment triggered (HTTP $HTTP_CODE)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Render deployment failed (HTTP $HTTP_CODE)"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "Response: $BODY"
            exit 1
          fi

      - name: Wait for Render deployment
        id: render_wait
        if: steps.render_deploy.outputs.status == 'success'
        run: |
          echo "⏳ Waiting 60s for Render to start building..."
          sleep 60

      - name: Health check - backend
        id: health_check
        if: >
          steps.render_deploy.outputs.status == 'success' &&
          github.event.inputs.force_deploy != true
        continue-on-error: true
        run: |
          echo "🔍 Checking backend health..."
          MAX_RETRIES=15
          RETRY_INTERVAL=20
          HEALTH_URL="https://sadaksathi.onrender.com/health/live"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend healthy! (attempt $i/$MAX_RETRIES)"
              echo "status=healthy" >> $GITHUB_OUTPUT
              HEALTH_DATA=$(curl -s "$HEALTH_URL")
              echo "Health: $HEALTH_DATA"
              exit 0
            fi

            echo "⏳ Attempt $i/$MAX_RETRIES - Status: $HTTP_CODE"
            sleep $RETRY_INTERVAL
          done

          echo "⚠️ Backend not ready yet (Render still building)"
          echo "status=building" >> $GITHUB_OUTPUT

      - name: Rollback on health failure
        id: rollback
        if: >
          steps.health_check.outcome == 'failure' &&
          steps.health_check.outputs.status != 'building' &&
          github.event.inputs.force_deploy != true
        run: |
          echo "🔄 Rolling back failed deployment..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}?rollback=true"
          echo "✅ Rollback triggered"

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

# ---------------------------------------------------------
# WORKER (PARALLEL)
# ---------------------------------------------------------
  worker:
    name: ☁️ Worker
    runs-on: ubuntu-latest
    needs: [preflight, detect-changes]

    if: >
      (github.event_name == 'push' ||
       github.event.inputs.deploy_target == 'all' ||
       github.event.inputs.deploy_target == 'worker' ||
       github.event.inputs.force_deploy == true) &&
      (needs.detect-changes.outputs.worker == 'true' ||
       needs.preflight.outputs.is_pr == 'true' ||
       github.event.inputs.force_deploy == true)

    outputs:
      deploy_status: ${{ steps.worker_deploy.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        id: worker_deploy
        run: |
          echo "🚀 Deploying Cloudflare Worker..."
          wrangler deploy
          echo "status=success" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Verify Worker
        if: steps.worker_deploy.outputs.status == 'success'
        run: |
          echo "🔍 Verifying Cloudflare Worker..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://merosadak.banjays.workers.dev" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker responding (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Worker returned HTTP $HTTP_CODE"
          fi

# ---------------------------------------------------------
# FRONTEND (PARALLEL)
# ---------------------------------------------------------
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: [preflight, detect-changes]

    if: >
      (github.event_name == 'push' ||
       github.event.inputs.deploy_target == 'all' ||
       github.event.inputs.deploy_target == 'frontend' ||
       github.event.inputs.force_deploy == true) &&
      (needs.detect-changes.outputs.frontend == 'true' ||
       needs.preflight.outputs.is_pr == 'true' ||
       github.event.inputs.force_deploy == true)

    outputs:
      build_time: ${{ steps.build_time.outputs.duration }}
      firebase_url: ${{ steps.firebase_deploy.outputs.details_url }}
      preview_url: ${{ steps.firebase_preview.outputs.details_url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Restore frontend cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/dist
          key: frontend-${{ env.CACHE_KEY }}
          restore-keys: |
            frontend-${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: cd frontend && npm install --include=dev
        timeout-minutes: 5

      - name: Save frontend cache
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            frontend/dist
          key: frontend-${{ env.CACHE_KEY }}

      - name: Build frontend
        id: build_step
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Calculate build time
        id: build_time
        run: |
          DURATION=$(($SECONDS))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "⏱️ Build completed in ${DURATION}s"

      - name: Deploy Firebase (Production)
        id: firebase_deploy
        if: >
          github.event_name != 'pull_request' &&
          needs.preflight.outputs.environment != 'dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: sadak-sathi-3ab73
          channelId: live

      - name: Deploy Firebase Preview (PR)
        id: firebase_preview
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: sadak-sathi-3ab73
          channelId: preview-${{ github.event.pull_request.number }}

      - name: Verify Frontend
        if: steps.firebase_deploy.outcome == 'success' || steps.firebase_preview.outcome == 'success'
        run: |
          echo "🔍 Verifying Firebase Hosting..."
          FIREBASE_URL="https://merosadak.web.app"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FIREBASE_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Frontend live (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Frontend returned HTTP $HTTP_CODE"
          fi

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

# ---------------------------------------------------------
# POST-DEPLOY VERIFICATION MATRIX
# ---------------------------------------------------------
  verify-deploy:
    name: ✅ Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [preflight, backend, worker, frontend]
    if: >
      always() &&
      needs.preflight.result == 'success' &&
      github.event_name != 'pull_request'

    steps:
      - name: Run verification matrix
        run: |
          echo "============================================="
          echo "  ✅ POST-DEPLOY VERIFICATION MATRIX"
          echo "============================================="
          echo ""

          PASS=0
          FAIL=0

          check_service() {
            local name=$1
            local url=$2
            local expected=${3:-200}

            echo -n "Checking $name... "
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "$expected" ]; then
              echo "✅ HTTP $HTTP_CODE"
              PASS=$((PASS + 1))
            else
              echo "❌ HTTP $HTTP_CODE (expected $expected)"
              FAIL=$((FAIL + 1))
            fi
          }

          check_service "Backend Health" "https://sadaksathi.onrender.com/health/live"
          check_service "Backend Ready" "https://sadaksathi.onrender.com/health/ready"
          check_service "Frontend" "https://merosadak.web.app"
          check_service "Worker" "https://merosadak.banjays.workers.dev"
          check_service "UptimeRobot" "https://uptimerobot.com/ZaSzISaXMt"

          echo ""
          echo "============================================="
          echo "  📊 RESULTS"
          echo "============================================="
          echo "✅ Passed: $PASS"
          echo "❌ Failed: $FAIL"
          echo ""

          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ $FAIL service(s) not responding - UptimeRobot will continue monitoring"
          else
            echo "✅ All services operational!"
          fi

# ---------------------------------------------------------
# DEPLOY SUMMARY
# ---------------------------------------------------------
  deploy-summary:
    name: 📝 Deploy Summary
    runs-on: ubuntu-latest
    needs: [preflight, detect-changes, backend, worker, frontend, verify-deploy]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 MeroSadak Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message || 'Manual deploy' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.preflight.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy target:** ${{ github.event.inputs.deploy_target || 'auto (push)' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔐 Secrets Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall:** ${{ needs.preflight.outputs.secrets_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Configured:** ${{ needs.preflight.outputs.configured_count }}/${{ needs.preflight.outputs.total_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Secret | Status | Impact |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Render | RENDER_DEPLOY_HOOK | ${{ needs.preflight.outputs.render_configured == 'true' && '✅' || '❌' }} | Deploy |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Firebase | FIREBASE_SERVICE_ACCOUNT | ${{ needs.preflight.outputs.firebase_configured == 'true' && '✅' || '❌' }} | Deploy |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Auth | JWT_SECRET | ${{ needs.preflight.outputs.jwt_configured == 'true' && '✅' || '❌' }} | Backend auth |" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Worker | CLOUDFLARE_API_TOKEN | ${{ needs.preflight.outputs.worker_configured == 'true' && '✅' || '🔄' }} | Keep-alive |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Telegram | TELEGRAM_BOT_TOKEN | ${{ needs.preflight.outputs.telegram_configured == 'true' && '✅' || '⚠️' }} | Alerts |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📂 Changed Paths" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** ${{ needs.detect-changes.outputs.backend == 'true' && '✅ Changed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** ${{ needs.detect-changes.outputs.frontend == 'true' && '✅ Changed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker:** ${{ needs.detect-changes.outputs.worker == 'true' && '✅ Changed' || '⏭️ Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status | Build Time |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://sadaksathi.onrender.com | ${{ needs.backend.result == 'success' && '✅' || needs.backend.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.backend.outputs.build_time || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://merosadak.web.app | ${{ needs.frontend.result == 'success' && '✅' || needs.frontend.result == 'skipped' && '⏭️' || '❌' }} | ${{ needs.frontend.outputs.build_time || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | https://merosadak.banjays.workers.dev | ${{ needs.worker.result == 'success' && '✅' || needs.worker.result == 'skipped' && '⏭️' || '❌' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Monitor | https://uptimerobot.com/ZaSzISaXMt | ✅ | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "### 🔍 PR Preview" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend Preview:** ${{ needs.frontend.outputs.preview_url || 'Check PR comments' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 🔄 Keep-Alive Chain" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Interval | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1️⃣ Render Self-Ping | 10 min | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 2️⃣ UptimeRobot | 5 min | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 3️⃣ Cloudflare Worker | 2 min | ${{ needs.preflight.outputs.worker_configured == 'true' && '✅' || '🔄' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend.result }}" = "success" ]; then
            echo "### 🔍 Backend Health" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Deploy: ${{ needs.backend.outputs.deploy_status }}" >> $GITHUB_STEP_SUMMARY
            echo "- Health: ${{ needs.backend.outputs.health_status || 'pending' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

# ---------------------------------------------------------
# TELEGRAM: SECRETS MISSING
# ---------------------------------------------------------
  notify-secrets-missing:
    name: ⚠️ Secrets Missing
    runs-on: ubuntu-latest
    needs: [preflight]
    if: failure()

    steps:
      - name: Send Telegram Alert
        run: |
          MSG="⚠️ DEPLOY BLOCKED%0A%0A📦 ${{ github.repository }}%0A🌿 ${{ github.ref_name }}%0A%0A📊 ${{ needs.preflight.outputs.configured_count }}/${{ needs.preflight.outputs.total_count }} configured%0A❌ Required missing: ${{ needs.preflight.outputs.missing_count }}%0A%0A🔧 https://github.com/${{ github.repository }}/settings/secrets/actions"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MSG" \
          -d parse_mode="HTML"

# ---------------------------------------------------------
# TELEGRAM: FAILURE
# ---------------------------------------------------------
  notify-failure:
    name: 🚨 Deploy Failed
    runs-on: ubuntu-latest
    needs: [backend, worker, frontend]
    if: failure()

    steps:
      - name: Send Telegram Alert
        run: |
          MSG="🚨 DEPLOY FAILED%0A%0A📦 ${{ github.repository }}%0A🌿 ${{ github.ref_name }}%0A🎯 ${{ github.event.inputs.deploy_target || 'auto' }}%0A👤 ${{ github.actor }}%0A%0A🔗 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MSG" \
          -d parse_mode="HTML"

# ---------------------------------------------------------
# TELEGRAM: SUCCESS
# ---------------------------------------------------------
  notify-success:
    name: ✅ Deploy Success
    runs-on: ubuntu-latest
    needs: [preflight, backend, worker, frontend]
    if: >-
      needs.preflight.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success'

    steps:
      - name: Send Telegram Alert
        run: |
          WORKER_STATUS="${{ needs.preflight.outputs.worker_configured == 'true' && 'Worker (2m)' || 'N/A' }}"
          MSG="✅ DEPLOY SUCCESSFUL%0A%0A📦 ${{ github.repository }}%0A🌿 ${{ github.ref_name }}%0A🎯 ${{ github.event.inputs.deploy_target || 'auto' }}%0A👤 ${{ github.actor }}%0A%0A🔗 Frontend: https://merosadak.web.app%0A🔧 Backend: https://sadaksathi.onrender.com%0A📊 Monitor: https://uptimerobot.com/ZaSzISaXMt%0A%0A🔄 Keep-Alive: Render (10m) + UptimeRobot (5m) + $WORKER_STATUS%0A%0A📝 ${{ github.event.head_commit.message || 'manual deploy' }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MSG" \
          -d parse_mode="HTML"
