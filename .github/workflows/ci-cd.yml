name: MeroSadak PRO Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Select deploy target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - worker
          - frontend

      environment:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: "20"
  NODE_NO_WARNINGS: 1

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------
# PRE-FLIGHT CHECKS
# ---------------------------------------------------------
jobs:
  preflight:
    name: 🔍 Environment & Secrets Check
    runs-on: ubuntu-latest

    outputs:
      secrets_status: ${{ steps.check_secrets.outputs.status }}
      render_configured: ${{ steps.check_secrets.outputs.render_ok }}
      firebase_configured: ${{ steps.check_secrets.outputs.firebase_ok }}
      worker_configured: ${{ steps.check_secrets.outputs.worker_ok }}
      telegram_configured: ${{ steps.check_secrets.outputs.telegram_ok }}
      jwt_configured: ${{ steps.check_secrets.outputs.jwt_ok }}
      missing_count: ${{ steps.check_secrets.outputs.missing_count }}
      total_count: ${{ steps.check_secrets.outputs.total_count }}

    steps:
      - name: Check required secrets
        id: check_secrets
        run: |
          echo "🔍 Verifying required secrets and environment variables..."
          echo ""

          REQUIRED_MISSING=0
          OPTIONAL_MISSING=0
          CONFIGURED=0
          TOTAL=0

          echo "============================================="
          echo "  🔐 SECRETS STATUS CHECK"
          echo "============================================="
          echo ""

          echo "--- 🎨 RENDER ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "✅ RENDER_DEPLOY_HOOK: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "render_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ RENDER_DEPLOY_HOOK: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "render_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 🔥 FIREBASE ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "✅ FIREBASE_SERVICE_ACCOUNT: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "firebase_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ FIREBASE_SERVICE_ACCOUNT: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "firebase_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 🔑 JWT AUTH ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "✅ JWT_SECRET: Configured"
            CONFIGURED=$((CONFIGURED + 1))
            echo "jwt_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ JWT_SECRET: Missing"
            REQUIRED_MISSING=$((REQUIRED_MISSING + 1))
            echo "jwt_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- ☁️ CLOUDFLARE WORKER ---"
          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "✅ CLOUDFLARE_API_TOKEN: Configured (Worker keep-alive)"
            CONFIGURED=$((CONFIGURED + 1))
            echo "worker_ok=true" >> $GITHUB_OUTPUT
          else
            echo "🔄 CLOUDFLARE_API_TOKEN: Missing"
            echo "   Fallback: UptimeRobot handles keep-alive (every 5 min)"
            echo "   See: https://uptimerobot.com/ZaSzISaXMt"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            echo "worker_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "--- 📱 TELEGRAM NOTIFICATIONS ---"
          TOTAL=$((TOTAL + 1))
          TELEGRAM_OK=true
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN: Configured"
            CONFIGURED=$((CONFIGURED + 1))
          else
            echo "⚠️ TELEGRAM_BOT_TOKEN: Missing (notifications disabled)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            TELEGRAM_OK=false
          fi

          TOTAL=$((TOTAL + 1))
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID: Configured"
            CONFIGURED=$((CONFIGURED + 1))
          else
            echo "⚠️ TELEGRAM_CHAT_ID: Missing (notifications disabled)"
            OPTIONAL_MISSING=$((OPTIONAL_MISSING + 1))
            TELEGRAM_OK=false
          fi

          if [ "$TELEGRAM_OK" = true ]; then
            echo "telegram_ok=true" >> $GITHUB_OUTPUT
          else
            echo "telegram_ok=false" >> $GITHUB_OUTPUT
          fi
          echo ""

          echo "============================================="
          echo "  📊 SUMMARY"
          echo "============================================="
          echo "Total secrets checked: $TOTAL"
          echo "✅ Configured: $CONFIGURED"
          echo "❌ Required missing: $REQUIRED_MISSING"
          echo "⚠️ Optional missing: $OPTIONAL_MISSING"
          echo ""

          echo "missing_count=$REQUIRED_MISSING" >> $GITHUB_OUTPUT
          echo "optional_missing_count=$OPTIONAL_MISSING" >> $GITHUB_OUTPUT
          echo "configured_count=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$REQUIRED_MISSING" -eq 0 ]; then
            echo "✅ All required secrets configured - ready to deploy!"
            echo "status=ready" >> $GITHUB_OUTPUT
          else
            echo "❌ $REQUIRED_MISSING required secret(s) missing - deploy will fail!"
            echo "status=missing_required" >> $GITHUB_OUTPUT
          fi

      - name: Display environment summary
        run: |
          echo "📋 Environment Summary"
          echo "====================="
          echo "Node.js Version: ${{ env.NODE_VERSION }}"
          echo "Deploy Target: ${{ github.event.inputs.deploy_target || 'auto (push)' }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Service URLs:"
          echo "  Frontend: https://merosadak.web.app"
          echo "  Backend:  https://sadaksathi.onrender.com"
          echo "  Worker:   https://merosadak.banjays.workers.dev"
          echo "  Monitor:  https://uptimerobot.com/ZaSzISaXMt"

# ---------------------------------------------------------
# BACKEND
# ---------------------------------------------------------
  backend:
    name: 🔧 Backend
    runs-on: ubuntu-latest
    needs: [preflight]

    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      build_time: ${{ steps.build_time.outputs.duration }}
      deploy_status: ${{ steps.render_deploy.outputs.status }}
      health_status: ${{ steps.health_check.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install backend dependencies
        run: cd backend && npm install --include=dev
        timeout-minutes: 5

      - name: Build backend
        id: build_step
        run: cd backend && npm run build
        env:
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Calculate build time
        id: build_time
        run: |
          DURATION=$(($SECONDS))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "⏱️ Build completed in ${DURATION}s"

      - name: Deploy Render
        id: render_deploy
        if: github.event.inputs.environment != 'dev'
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Render deployment triggered successfully (HTTP $HTTP_CODE)"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Render deployment failed (HTTP $HTTP_CODE)"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "Response: $BODY"
            exit 1
          fi

      - name: Wait for Render deployment
        id: render_wait
        if: steps.render_deploy.outputs.status == 'success'
        run: |
          echo "⏳ Waiting 60s for Render to start building..."
          sleep 60

      - name: Health check - backend
        id: health_check
        if: steps.render_deploy.outputs.status == 'success'
        continue-on-error: true
        run: |
          echo "🔍 Checking backend health..."
          MAX_RETRIES=15
          RETRY_INTERVAL=20
          HEALTH_URL="https://sadaksathi.onrender.com/health/live"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend is healthy! (attempt $i/$MAX_RETRIES)"
              echo "status=healthy" >> $GITHUB_OUTPUT

              # Get health details
              HEALTH_DATA=$(curl -s "$HEALTH_URL")
              echo "Health response: $HEALTH_DATA"
              exit 0
            fi

            echo "⏳ Attempt $i/$MAX_RETRIES - Status: $HTTP_CODE (waiting ${RETRY_INTERVAL}s)..."
            sleep $RETRY_INTERVAL
          done

          echo "⚠️ Backend health check not yet ready after $MAX_RETRIES attempts"
          echo "This is normal — Render may still be building"
          echo "status=building" >> $GITHUB_OUTPUT
          echo "✅ UptimeRobot will continue monitoring: https://uptimerobot.com/ZaSzISaXMt"

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

# ---------------------------------------------------------
# WORKER
# ---------------------------------------------------------
  worker:
    name: ☁️ Worker
    runs-on: ubuntu-latest
    needs: [preflight]

    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'worker' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      deploy_status: ${{ steps.worker_deploy.outputs.status }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install -g wrangler

      - name: Deploy Worker
        id: worker_deploy
        run: |
          echo "🚀 Deploying Cloudflare Worker..."
          wrangler deploy
          echo "status=success" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Verify Worker deployment
        if: steps.worker_deploy.outcome == 'success'
        run: |
          echo "🔍 Verifying Cloudflare Worker..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://merosadak.banjays.workers.dev" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is responding (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Worker returned HTTP $HTTP_CODE"
          fi

# ---------------------------------------------------------
# FRONTEND
# ---------------------------------------------------------
  frontend:
    name: 🎨 Frontend
    runs-on: ubuntu-latest
    needs: [preflight]

    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend' ||
      github.event_name == 'workflow_dispatch'

    outputs:
      build_time: ${{ steps.build_time.outputs.duration }}
      firebase_url: ${{ steps.firebase_deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install frontend dependencies
        run: cd frontend && npm install --include=dev
        timeout-minutes: 5

      - name: Build frontend
        id: build_step
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Calculate build time
        id: build_time
        run: |
          DURATION=$(($SECONDS))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "⏱️ Build completed in ${DURATION}s"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

      - name: Deploy Firebase
        id: firebase_deploy
        if: github.event.inputs.environment != 'dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: sadak-sathi-3ab73
          channelId: live
        continue-on-error: true

      - name: Verify Firebase deployment
        if: steps.firebase_deploy.outcome == 'success'
        run: |
          echo "🔍 Verifying Firebase Hosting..."
          FIREBASE_URL="https://merosadak.web.app"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FIREBASE_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Frontend is live at $FIREBASE_URL (HTTP $HTTP_CODE)"
            echo "url=$FIREBASE_URL" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Frontend returned HTTP $HTTP_CODE"
            echo "url=$FIREBASE_URL" >> $GITHUB_OUTPUT
          fi

# ---------------------------------------------------------
# MONITORING & STATUS CHECKER
# ---------------------------------------------------------
  monitoring-check:
    name: 📊 Monitoring & Status Checker
    runs-on: ubuntu-latest
    needs: [backend, worker, frontend]
    if: always()

    steps:
      - name: Run full status check
        run: |
          echo "============================================="
          echo "  🔍 MEROSADAK STATUS CHECK"
          echo "============================================="
          echo ""

          PASS=0
          FAIL=0
          SKIP=0

          check_service() {
            local name=$1
            local url=$2
            local expected=${3:-200}
            local timeout=${4:-10}

            echo -n "Checking $name... "
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time $timeout "$url" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "$expected" ]; then
              echo "✅ HTTP $HTTP_CODE"
              PASS=$((PASS + 1))
            elif [ "$HTTP_CODE" = "000" ]; then
              echo "⏳ Not ready yet"
              SKIP=$((SKIP + 1))
            else
              echo "❌ HTTP $HTTP_CODE (expected $expected)"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "--- 📦 BACKEND SERVICES ---"
          check_service "Backend (Render Health)" "https://sadaksathi.onrender.com/health/live"
          check_service "Backend (Render Ready)" "https://sadaksathi.onrender.com/health/ready"
          check_service "Backend (API)" "https://sadaksathi.onrender.com/api/v1/roads"
          echo ""

          echo "--- 🎨 FRONTEND ---"
          check_service "Frontend (Firebase)" "https://merosadak.web.app"
          echo ""

          echo "--- ☁️ WORKER ---"
          check_service "Cloudflare Worker" "https://merosadak.banjays.workers.dev"
          echo ""

          echo "--- 📊 MONITORING ---"
          check_service "UptimeRobot Status" "https://uptimerobot.com/ZaSzISaXMt"
          echo ""

          echo "--- 🔧 ENVIRONMENT ---"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deploy target: ${{ github.event.inputs.deploy_target || 'auto' }}"
          echo ""

          echo "============================================="
          echo "  📊 STATUS SUMMARY"
          echo "============================================="
          echo "✅ Passed: $PASS"
          echo "❌ Failed: $FAIL"
          echo "⏳ Skipped: $SKIP"
          echo ""

          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ $FAIL service(s) not responding"
            echo "💡 UptimeRobot continues monitoring: https://uptimerobot.com/ZaSzISaXMt"
          elif [ "$SKIP" -gt 0 ]; then
            echo "ℹ️ Some services still building (Render takes 2-5 min)"
          else
            echo "✅ All services operational!"
          fi

# ---------------------------------------------------------
# DEPLOY SUMMARY
# ---------------------------------------------------------
  deploy-summary:
    name: 📝 Deploy Summary
    runs-on: ubuntu-latest
    needs: [preflight, backend, worker, frontend, monitoring-check]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 MeroSadak Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message || 'Manual deploy' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy target:** ${{ github.event.inputs.deploy_target || 'auto (push)' }}" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 Secrets Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall:** ${{ needs.preflight.outputs.secrets_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Configured:** ${{ needs.preflight.outputs.configured_count }}/${{ needs.preflight.outputs.total_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Missing (required):** ${{ needs.preflight.outputs.missing_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Secret | Status | Impact if Missing |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Render | RENDER_DEPLOY_HOOK | ${{ needs.preflight.outputs.render_configured == 'true' && '✅' || '❌ Missing' }} | ${{ needs.preflight.outputs.render_configured == 'true' && 'Deploy works' || 'Deploy will fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Firebase | FIREBASE_SERVICE_ACCOUNT | ${{ needs.preflight.outputs.firebase_configured == 'true' && '✅' || '❌ Missing' }} | ${{ needs.preflight.outputs.firebase_configured == 'true' && 'Deploy works' || 'Deploy will fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Auth | JWT_SECRET | ${{ needs.preflight.outputs.jwt_configured == 'true' && '✅' || '❌ Missing' }} | ${{ needs.preflight.outputs.jwt_configured == 'true' && 'Auth works' || 'Auth will break' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Cloudflare | CLOUDFLARE_API_TOKEN | ${{ needs.preflight.outputs.worker_configured == 'true' && '✅ Worker active' || '🔄 Using UptimeRobot fallback' }} | ${{ needs.preflight.outputs.worker_configured == 'true' && 'Worker pings every 2 min' || 'UptimeRobot handles keep-alive' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Telegram | TELEGRAM_BOT_TOKEN | ${{ needs.preflight.outputs.telegram_configured == 'true' && '✅ Notifications on' || '⚠️ Notifications off' }} | ${{ needs.preflight.outputs.telegram_configured == 'true' && 'Alerts sent' || 'No deploy alerts' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Telegram | TELEGRAM_CHAT_ID | ${{ needs.preflight.outputs.telegram_configured == 'true' && '✅ Chat configured' || '⚠️ Chat ID missing' }} | ${{ needs.preflight.outputs.telegram_configured == 'true' && 'Messages delivered' || 'Messages not sent' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Keep-Alive Fallback Chain" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Mechanism | Interval | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1️⃣ | Render Self-Ping (built-in) | 10 min | ✅ Always active |" >> $GITHUB_STEP_SUMMARY
          echo "| 2️⃣ | UptimeRobot (public monitor) | 5 min | ✅ https://uptimerobot.com/ZaSzISaXMt |" >> $GITHUB_STEP_SUMMARY
          echo "| 3️⃣ | Cloudflare Worker (cron) | 2 min | ${{ needs.preflight.outputs.worker_configured == 'true' && '✅ Active' || '🔄 Skipped (UptimeRobot fallback)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://sadaksathi.onrender.com | ${{ needs.backend.result == 'success' && '✅ Deployed' || needs.backend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | https://merosadak.banjays.workers.dev | ${{ needs.worker.result == 'success' && '✅ Deployed' || needs.worker.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://merosadak.web.app | ${{ needs.frontend.result == 'success' && '✅ Deployed' || needs.frontend.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Monitoring | https://uptimerobot.com/ZaSzISaXMt | ✅ Active |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Build Times" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** ${{ needs.backend.outputs.build_time || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** ${{ needs.frontend.outputs.build_time || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend.result }}" = "success" ]; then
            echo "### Backend Health" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Deploy Status: ${{ needs.backend.outputs.deploy_status }}" >> $GITHUB_STEP_SUMMARY
            echo "- Health Check: ${{ needs.backend.outputs.health_status || 'Render building (check UptimeRobot)' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 💡 Render takes 2-5 minutes to build. UptimeRobot monitors continuously:" >> $GITHUB_STEP_SUMMARY
            echo "> https://uptimerobot.com/ZaSzISaXMt" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

# ---------------------------------------------------------
# TELEGRAM ALERTS (Always runs, checks status internally)
# ---------------------------------------------------------
  notify:
    name: 📱 Telegram Notifications
    runs-on: ubuntu-latest
    needs: [preflight, backend, worker, frontend]
    if: always()

    steps:
      - name: Determine status and send alert
        run: |
          # Collect job results
          PREFLIGHT="${{ needs.preflight.result }}"
          BACKEND="${{ needs.backend.result }}"
          WORKER="${{ needs.worker.result }}"
          FRONTEND="${{ needs.frontend.result }}"
          MISSING="${{ needs.preflight.outputs.missing_count }}"
          CONFIGURED="${{ needs.preflight.outputs.configured_count }}/${{ needs.preflight.outputs.total_count }}"

          echo "📊 Job Results:"
          echo "  Preflight: $PREFLIGHT"
          echo "  Backend: $BACKEND"
          echo "  Worker: $WORKER"
          echo "  Frontend: $FRONTEND"
          echo "  Secrets: $CONFIGURED configured, $MISSING missing"
          echo ""

          # Determine status type
          if [ "$PREFLIGHT" = "failure" ] || [ "$MISSING" -gt 0 ] 2>/dev/null; then
            STATUS="🚨 SECRETS MISSING"
            COLOR="⚠️"
            MSG="$COLOR DEPLOY BLOCKED - MISSING SECRETS%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A%0A📊 Secrets: $CONFIGURED configured%0A❌ Required missing: $MISSING%0A%0ARequired secrets:%0A• RENDER_DEPLOY_HOOK ${{ needs.preflight.outputs.render_configured == 'true' && '✅' || '❌ MISSING' }}%0A• FIREBASE_SERVICE_ACCOUNT ${{ needs.preflight.outputs.firebase_configured == 'true' && '✅' || '❌ MISSING' }}%0A• JWT_SECRET ${{ needs.preflight.outputs.jwt_configured == 'true' && '✅' || '❌ MISSING' }}%0A%0AOptional secrets:%0A• CLOUDFLARE_API_TOKEN ${{ needs.preflight.outputs.worker_configured == 'true' && '✅' || '⚠️ Missing (UptimeRobot fallback)' }}%0A%0A🔧 Fix at: https://github.com/${{ github.repository }}/settings/secrets/actions"
          elif [ "$BACKEND" = "failure" ] || [ "$WORKER" = "failure" ] || [ "$FRONTEND" = "failure" ]; then
            STATUS="🚨 DEPLOY FAILED"
            COLOR="🔴"
            FAILED_JOBS=""
            [ "$BACKEND" = "failure" ] && FAILED_JOBS="$FAILED_JOBS%0A• 🔧 Backend"
            [ "$WORKER" = "failure" ] && FAILED_JOBS="$FAILED_JOBS%0A• ☁️ Worker"
            [ "$FRONTEND" = "failure" ] && FAILED_JOBS="$FAILED_JOBS%0A• 🎨 Frontend"
            MSG="$COLOR DEPLOY FAILED%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A🎯 Target: ${{ github.event.inputs.deploy_target || 'auto' }}%0A👤 Actor: ${{ github.actor }}%0A%0A❌ Failed:$FAILED_JOBS%0A%0A🔗 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            STATUS="✅ DEPLOY SUCCESS"
            COLOR="✅"
            WORKER_STATUS="${{ needs.preflight.outputs.worker_configured == 'true' && 'Worker (2m)' || 'N/A' }}"
            MSG="$COLOR DEPLOY SUCCESSFUL%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}%0A🎯 Target: ${{ github.event.inputs.deploy_target || 'auto' }}%0A👤 Actor: ${{ github.actor }}%0A%0A🔗 Frontend: https://merosadak.web.app%0A🔧 Backend: https://sadaksathi.onrender.com%0A☁️ Worker: https://merosadak.banjays.workers.dev%0A📊 Monitor: https://uptimerobot.com/ZaSzISaXMt%0A%0A🔄 Keep-Alive: Render (10m) + UptimeRobot (5m) + $WORKER_STATUS%0A%0A📝 Commit: ${{ github.event.head_commit.message || 'manual deploy' }}"
          else
            STATUS="⏭️ SKIPPED"
            COLOR="⏭️"
            MSG="$COLOR DEPLOY SKIPPED%0A%0APreflight: $PREFLIGHT%0ABackend: $BACKEND%0AWorker: $WORKER%0AFrontend: $FRONTEND%0A%0A📦 Repo: ${{ github.repository }}%0A🌿 Branch: ${{ github.ref_name }}"
          fi

          echo "📤 Sending Telegram alert: $STATUS"
          echo ""
          echo "Message: $(echo -e "$MSG" | sed 's/%0A/\n/g' | head -20)..."
          echo ""

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MSG\", \"parse_mode\": \"HTML\"}" 2>/dev/null || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Telegram alert sent successfully"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌ Telegram bot is BLOCKED (HTTP 403)"
            echo "   Fix: Open Telegram → Find bot → Send /start"
          elif [ "$HTTP_CODE" = "400" ]; then
            echo "❌ Invalid chat ID or token (HTTP 400)"
            echo "   Fix: Check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets"
          else
            echo "⚠️ Telegram failed (HTTP $HTTP_CODE)"
          fi