name: Sadak-Sathi CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "package.json"
      - ".github/workflows/build-deploy-host.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: BACKEND BUILD & TEST
  # ---------------------------------------------------------
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      PORT: ${{ secrets.PORT }}
      API_PREFIX: ${{ secrets.API_PREFIX }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      GAS_URL: ${{ secrets.GAS_URL }}
      TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATA_DIR: ${{ secrets.DATA_DIR }}
      CACHE_DIR: ${{ secrets.CACHE_DIR }}
      LOG_DIR: ${{ secrets.LOG_DIR }}
      SHEET_ID: ${{ secrets.SHEET_ID }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: cd backend && npm run lint || true

      - name: Build backend
        run: |
          cd backend
          export NODE_ENV=production
          rm -rf dist
          npx tsup

      - name: Audit backend dependencies
        run: npm audit --audit-level=moderate -w backend || true

      - name: Check forbidden runtime files
        run: |
          for dir in backend/logs backend/data/cache; do
            if [ -d "$dir" ] && [ "$(ls -A $dir)" ]; then
              echo "❌ Forbidden files found in $dir"
              exit 1
            fi
          done
          echo "✅ No forbidden files"

      - name: Trigger Render deployment (backend)
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "✅ Backend deployed on Render"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK not set"
          fi

  # ---------------------------------------------------------
  # JOB 2: FRONTEND BUILD & FIREBASE DEPLOY
  # ---------------------------------------------------------
  frontend-build:
    name: Frontend Build & Deploy
    runs-on: ubuntu-latest
    needs: backend-build

    env:
      NODE_ENV: production
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_APP_NAME: SadakSathi
      VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install backend deps
        run: npm install

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Copy boundary file
        run: |
          mkdir -p frontend/dist/boundary
          cp backend/data/boundary.geojson frontend/dist/boundary/

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SADAKSATHI }}"
          projectId: sadak-sathi-3ab73
          channelId: live