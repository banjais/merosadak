name: Sadak-Sathi CI/CD pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-deploy-host.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: BUILD & TEST BACKEND
  # ---------------------------------------------------------
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PORT: ${{ secrets.PORT }}
      API_PREFIX: ${{ secrets.API_PREFIX }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      GAS_URL: ${{ secrets.GAS_URL }}
      TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATA_DIR: ${{ secrets.DATA_DIR }}
      CACHE_DIR: ${{ secrets.CACHE_DIR }}
      LOG_DIR: ${{ secrets.LOG_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend
        continue-on-error: true

      - name: Build backend
        run: npm run build
        working-directory: backend
        env:
          # Expose all secret-based env variables to build
          NODE_ENV: production
          PORT: ${{ secrets.PORT }}
          API_PREFIX: ${{ secrets.API_PREFIX }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GAS_URL: ${{ secrets.GAS_URL }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATA_DIR: ${{ secrets.DATA_DIR }}
          CACHE_DIR: ${{ secrets.CACHE_DIR }}
          LOG_DIR: ${{ secrets.LOG_DIR }}

      - name: Check forbidden files (logs/cache)
        run: |
          FILES=""
          for dir in ./backend/logs ./frontend/logs ./backend/data/cache ./frontend/data/cache; do
            if [ -d "$dir" ]; then
              FILES="$FILES $(find $dir)"
            fi
          done
          if [ -n "$FILES" ]; then
            echo "❌ Found forbidden files:"
            echo "$FILES"
            exit 1
          else
            echo "✅ No forbidden files found"

      - name: Trigger Render deployment
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "✅ Render deployment triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK not set. Skipping Render deploy."

  # ---------------------------------------------------------
  # JOB 2: BUILD & DEPLOY FRONTEND
  # ---------------------------------------------------------
  frontend-build:
    name: Frontend Build & Firebase Deploy
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ secrets.API_PREFIX }}
      VITE_APP_NAME: SadakSathi
      VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_APP_KEY: ${{ secrets.FIREBASE_APP_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_BACKEND: ${{ secrets.FIREBASE_BACKEND }}
      FIREBASE_BASE_URL: ${{ secrets.FIREBASE_BASE_URL }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SADAKSATHI }}"
          projectId: sadaksathi
          channelId: live
