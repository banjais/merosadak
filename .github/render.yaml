services:
  # Frontend service
  - type: web
    name: merosadak-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NPM_VERSION
        value: 9
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    redirects:
      - path: /*
        to: /index.html
        condition: 404

  # Backend service
  - type: web
    name: merosadak-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

databases:
  - databaseName: merosadak_db
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs (configure specific IPs in production)

envVarGroups:
  - name: production-vars
    envVars:
      - key: NODE_ENV
        value: production